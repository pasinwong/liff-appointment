<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองคิวนัดหมาย</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06C755; --dark-gray: #333; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f9; color: var(--dark-gray); margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--line-green); text-align: center; }
        .profile-section { text-align: center; margin-bottom: 20px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--line-green); }
        
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="date"]:focus { border-color: var(--line-green); }
        
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .time-btn { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .time-btn.active { background: var(--line-green); color: white; border-color: var(--line-green); }

        .btn-confirm { width: 100%; background: var(--line-green); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .btn-edit { background: #ff9800; margin-top: 10px; }
        
        #summary-section { display: none; text-align: center; border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; }
        .badge { background: #e8f5e9; color: #2e7d32; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .summary-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 15px 0; line-height: 1.6; }
        .no-time-msg { grid-column: span 3; text-align: center; color: #ff3b30; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-section">
        <img id="userImg" class="profile-img" src="https://via.placeholder.com/60" alt="Profile">
        <p id="userName">กำลังโหลดข้อมูล...</p>
    </div>

    <h2>จองคิวนัดหมาย</h2>

    <div id="booking-form">
        <label>เลือกวันที่นัดหมาย:</label>
        <input type="date" id="datePicker" onchange="handleDateChange()">

        <label>เลือกเวลา:</label>
        <div class="time-grid" id="timeGrid"></div>

        <button class="btn-confirm" id="confirmBtn" onclick="handleBooking()">ยืนยันการจอง</button>
    </div>

    <div id="summary-section">
        <span class="badge">ตรวจสอบข้อมูลนัดหมาย</span>
        <div class="summary-box">
            <div id="summaryText"></div>
        </div>
        <button class="btn-confirm btn-edit" onclick="showEditForm()">แก้ไขข้อมูลการจอง</button>
    </div>
</div>

<script>
    // 🎯 ขยายรอบเวลาให้จองได้จนถึงเวลา 22:00 น.
    const times = [
        "09:00", "10:00", "11:00", "12:00", 
        "13:00", "14:00", "15:00", "16:00", 
        "17:00", "18:00", "19:00", "20:00", 
        "21:00", "22:00"
    ];
    let selectedTime = "";
    let userProfile = null;

    function getTodayString() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    async function initLIFF() {
        try {
            await liff.init({ liffId: "1655947825-VavZD7b1" }); 
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                userProfile = await liff.getProfile();
                document.getElementById("userName").innerText = userProfile.displayName;
                document.getElementById("userImg").src = userProfile.pictureUrl;
                
                // ตั้งค่าเริ่มต้นของปฏิทินให้เป็น "วันนี้" โดยอัตโนมัติเพื่อความสะดวก
                const today = getTodayString();
                const datePicker = document.getElementById("datePicker");
                datePicker.min = today;
                if (!datePicker.value) {
                    datePicker.value = today;
                }
                
                renderTimeButtons();
                checkExistingBooking();
            }
        } catch (error) {
            console.error("LIFF Init Error", error);
        }
    }

    function formatDateDisplay(dateStr) {
        if (!dateStr) return "";
        const [year, month, day] = dateStr.split('-');
        const thaiYear = parseInt(year) + 543; 
        return `${day}/${month}/${thaiYear}`;
    }

    function renderTimeButtons() {
        const grid = document.getElementById("timeGrid");
        grid.innerHTML = "";
        
        const selectedDate = document.getElementById("datePicker").value;
        const todayStr = getTodayString();
        
        const now = new Date();
        const currentHours = String(now.getHours()).padStart(2, '0');
        const currentMinutes = String(now.getMinutes()).padStart(2, '0');
        const currentTimeStr = `${currentHours}:${currentMinutes}`;

        let visibleButtonsCount = 0;

        times.forEach(t => {
            // หากเลือกวันปัจจุบัน ปุ่มเวลาใดที่เลยเวลาปัจจุบันไปแล้ว จะไม่ถูกนำมาแสดง
            if (selectedDate === todayStr && t <= currentTimeStr) {
                return; 
            }

            visibleButtonsCount++;
            const btn = document.createElement("button");
            btn.className = "time-btn";
            btn.innerText = t;
            btn.onclick = () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTime = t;
            };
            grid.appendChild(btn);
        });

        if (visibleButtonsCount === 0 && selectedDate !== "") {
            grid.innerHTML = `<div class="no-time-msg">❌ รอบเวลาสำหรับวันนี้หมดแล้ว<br>กรุณาเลือกวันถัดไปค่ะ</div>`;
        }
    }

    function handleDateChange() {
        const datePicker = document.getElementById("datePicker");
        const selectedDate = datePicker.value;
        const todayStr = getTodayString();

        if (selectedDate < todayStr && selectedDate !== "") {
            alert("ไม่สามารถเลือกวันที่ย้อนหลังได้ค่ะ ระบบจะปรับเป็นวันปัจจุบันให้โดยอัตโนมัติ");
            datePicker.value = todayStr;
        }

        selectedTime = ""; 
        renderTimeButtons(); 
    }

    function handleBooking() {
        const dateInput = document.getElementById("datePicker").value;
        const todayStr = getTodayString();

        if (!dateInput || !selectedTime) {
            alert("กรุณาเลือกวันและเวลาให้ครบถ้วนครับ");
            return;
        }

        if (dateInput < todayStr) {
            alert("ไม่สามารถจองวันย้อนหลังได้ กรุณาเลือกวันที่ใหม่ค่ะ");
            handleDateChange();
            return;
        }

        const now = new Date();
        const currentHours = String(now.getHours()).padStart(2, '0');
        const currentMinutes = String(now.getMinutes()).padStart(2, '0');
        const currentTimeStr = `${currentHours}:${currentMinutes}`;

        if (dateInput === todayStr && selectedTime <= currentTimeStr) {
            alert("เวลานี้เลยกำหนดแล้ว กรุณาเลือกเวลาอื่นใหม่ค่ะ");
            handleDateChange(); 
            return;
        }

        const formattedDate = formatDateDisplay(dateInput);
        const bookingData = { 
            rawDate: dateInput, 
            displayDate: formattedDate, 
            time: selectedTime 
        };

        localStorage.setItem(`booking_${userProfile.userId}`, JSON.stringify(bookingData));

        liff.sendMessages([{
            type: 'text',
            text: `📢 ยืนยันนัดหมายสำเร็จ!\n👤 คุณ: ${userProfile.displayName}\n📅 วันที่: ${formattedDate}\n⏰ เวลา: ${selectedTime} น.\n\nหากต้องการแก้ไขหรือดูข้อมูลคิว สามารถกดเข้าเมนูจองคิวเดิมได้ตลอดเวลาค่ะ`
        }]).then(() => {
            alert("บันทึกข้อมูลเรียบร้อยแล้ว");
            liff.closeWindow();
        });
    }

    function checkExistingBooking() {
        const saved = localStorage.getItem(`booking_${userProfile.userId}`);
        if (saved) {
            const data = JSON.parse(saved);
            const now = new Date();
            const bookingDateTime = new Date(`${data.rawDate}T${data.time}:00`);

            if (now > bookingDateTime) {
                localStorage.removeItem(`booking_${userProfile.userId}`);
                alert("เลยเวลานัดหมายเดิมแล้ว กรุณาทำการนัดหมายใหม่ค่ะ");
                document.getElementById("booking-form").style.display = "block";
                document.getElementById("summary-section").style.display = "none";
                renderTimeButtons();
            } else {
                document.getElementById("booking-form").style.display = "none";
                document.getElementById("summary-section").style.display = "block";
                document.getElementById("summaryText").innerHTML = `📅 <b>วันที่นัด:</b> ${data.displayDate}<br>⏰ <b>เวลานัด:</b> ${data.time} น.`;
            }
        } else {
            renderTimeButtons();
        }
    }

    function showEditForm() {
        document.getElementById("booking-form").style.display = "block";
        document.getElementById("summary-section").style.display = "none";
        renderTimeButtons(); 
    }

    initLIFF();
</script>

</body>
</html>
